<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Secure Voting{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #f0f4ff; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; }
        .topnav { background: #fff; border-bottom: 1px solid #e8eaed; padding: 0.875rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { display: flex; align-items: center; gap: 0.6rem; font-weight: 700; font-size: 0.95rem; color: #1a1a2e; text-decoration: none; }
        .nav-brand-icon { width: 30px; height: 30px; background: #2563eb; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
        .secure-badge { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: #16a34a; }
        .main-content { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 3rem 1rem; }
        footer { background: #1a1a2e; color: rgba(255,255,255,0.45); text-align: center; padding: 1.25rem; font-size: 0.75rem; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="topnav">
        <a href="#" class="nav-brand">
            <div class="nav-brand-icon"><i class="bi bi-shield-check" style="color:white;font-size:0.85rem;"></i></div>
            Election Admin
        </a>
        <div class="secure-badge">
            <i class="bi bi-lock-fill"></i> Secure &amp; Encrypted
        </div>
    </nav>

    <div class="main-content">
        <div style="width:100%;max-width:520px;">
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-{{ 'danger' if msg.category == 'error' else msg.category }} alert-dismissible fade show mb-3" role="alert" style="border-radius:10px;font-size:0.875rem;">
                        {{ msg.message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>

    <footer>
        <p style="margin:0;">&copy; <span id="year"></span> Election Admin. Built with privacy and security in mind.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
    {% block scripts %}{% endblock %}
</body>
</html>
