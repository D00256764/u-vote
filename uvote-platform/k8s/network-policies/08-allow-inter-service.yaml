---
# --- election-service egress → admin-service ---------------------------------
# election-service calls admin-service to get voter counts
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-election-to-admin
  namespace: uvote-dev
spec:
  podSelector:
    matchLabels:
      app: election-service
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: admin-service
    ports:
    - port: 5002
      protocol: TCP

---
# --- auth ingress from all services (matching the egress rules above) --------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-auth-ingress
  namespace: uvote-dev
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend-service
    - podSelector:
        matchLabels:
          app: election-service
    - podSelector:
        matchLabels:
          app: admin-service
    - podSelector:
        matchLabels:
          app: voting-service
    - podSelector:
        matchLabels:
          app: results-service
    ports:
    - port: 5001
      protocol: TCP
