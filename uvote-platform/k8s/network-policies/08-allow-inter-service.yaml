# =============================================================================
# U-Vote Inter-Service Communication Policies
#
# The default-deny (00) blocks all egress, including service-to-service calls.
# This file opens the specific paths each service needs to call others.
#
# frontend  → auth-service    (login, register, token validation)
# frontend  → admin-service   (voter management pages)
# frontend  → voting-service  (ballot display, vote submission)
# frontend  → results-service (results display)
# election-service → auth-service  (JWT validation, _require_login)
# admin-service    → auth-service  (JWT validation)
# voting-service   → auth-service  (token/JWT validation)
# results-service  → auth-service  (JWT validation)
# =============================================================================

# --- frontend egress → auth-service ------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-auth
  namespace: uvote-dev
spec:
  podSelector:
    matchLabels:
      app: frontend-service
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: auth-service
    ports:
    - port: 5001
      protocol: TCP

---
# --- frontend egress → admin-service -----------------------------------------
apiVersion: networking.k8s.io/v1
