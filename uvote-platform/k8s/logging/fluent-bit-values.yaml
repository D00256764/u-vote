# =============================================================================
# U-Vote Fluent Bit Configuration
# DaemonSet log collector: tails uvote-* container logs → Elasticsearch
# =============================================================================
#
# Tails only pods in uvote-dev namespace (filename pattern uvote-dev_*).
# Services emit pure JSON stdout (python-json-logger + --no-access-log).
# Elasticsearch is running with HTTPS enforced; TLS verify is Off
# (self-signed cert acceptable for local Kind development).
#
# The elastic password is never hardcoded — it is read at runtime from the
# elasticsearch-master-credentials Secret via the ES_PASSWORD env var.
# =============================================================================

image:
  repository: fluent/fluent-bit
  tag: "3.0.4"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Inject elastic password from the auto-generated ES credentials Secret
env:
  - name: ES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-master-credentials
        key: password

# Mount host log directory so Fluent Bit can tail container logs
volumeMounts:
  - name: varlog
    mountPath: /var/log

volumes:
  - name: varlog
    hostPath:
      path: /var/log

config:
  service: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*uvote-dev*.log
        multiline.parser  docker, cri
        Tag               uvote.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               uvote.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

  outputs: |
    [OUTPUT]
        Name            es
        Match           uvote.*
        Host            elasticsearch-master.monitoring.svc.cluster.local
        Port            9200
        Index           uvote-logs
        HTTP_User       elastic
        HTTP_Passwd     ${ES_PASSWORD}
        tls             On
        tls.verify      Off
        Suppress_Type_Name On
        Replace_Dots    On
        Retry_Limit     False
        Buffer_Size     False
