# =============================================================================
# Grafana — pre-provisioned with Prometheus datasource + u-vote SLI dashboard
#
# Access: http://<node-ip>:30300  (admin / admin)
#
# Three ConfigMaps are mounted into the Grafana container:
#   1. grafana-datasources  → /etc/grafana/provisioning/datasources/
#   2. grafana-dashboards-provider → /etc/grafana/provisioning/dashboards/
#   3. grafana-dashboard-sli → /etc/grafana/dashboards/
#
# The SLI dashboard loads automatically on first start — no manual import needed.
# =============================================================================

# -----------------------------------------------------------------------------
# ConfigMap 1 — Prometheus datasource
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: uvote-dev
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false

---
# -----------------------------------------------------------------------------
# ConfigMap 2 — Dashboard provider (tells Grafana where to find JSON files)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: uvote-dev
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: uvote
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/dashboards

---
# -----------------------------------------------------------------------------
# ConfigMap 3 — u-vote SLI dashboard JSON
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-sli
  namespace: uvote-dev
data:
  uvote-sli.json: |
    {
      "id": null,
      "uid": "uvote-sli",
      "title": "u-vote SLI Dashboard",
      "tags": ["uvote", "sli"],
      "timezone": "browser",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s) — all services",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by (job) (rate(http_requests_total[1m]))",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          }
        },
        {
          "id": 2,
          "title": "HTTP Error Rate (5xx) — all services",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum by (job) (rate(http_requests_total{status=~\"5xx\"}[1m])) / sum by (job) (rate(http_requests_total[1m]))",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": { "mode": "fixed", "fixedColor": "red" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.005 }
                ]
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          }
        },
        {
          "id": 3,
          "title": "p95 Latency (seconds) — all services",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (job, le) (rate(http_request_duration_seconds_bucket[1m])))",
              "legendFormat": "{{job}} p95",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 0.5 }
                ]
              }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "table", "placement": "bottom" }
          }
        },
        {
          "id": 4,
          "title": "Vote Throughput (votes cast / min)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"voting-service\", handler=\"/vote/submit\", status=\"2xx\"}[1m])) * 60",
              "legendFormat": "votes/min",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "options": {
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 5,
          "title": "Availability SLI (non-5xx / total)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status!~\"5xx\"}[5m])) / sum(rate(http_requests_total[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.99 },
                  { "color": "green", "value": 0.995 }
                ]
              },
              "mappings": []
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }
        },
        {
          "id": 6,
          "title": "Overall Error Rate",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5xx\"}[5m])) / sum(rate(http_requests_total[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.001 },
                  { "color": "red", "value": 0.005 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }
        },
        {
          "id": 7,
          "title": "Global p95 Latency",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m])))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 0.5 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }
        },
        {
          "id": 8,
          "title": "Total Requests (last 5m)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(http_requests_total[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
        }
      ]
    }

---
# -----------------------------------------------------------------------------
# Grafana Deployment
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: uvote-dev
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.1.0
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboards-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboard-sli
          mountPath: /etc/grafana/dashboards
        - name: data
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: dashboards-provider
        configMap:
          name: grafana-dashboards-provider
      - name: dashboard-sli
        configMap:
          name: grafana-dashboard-sli
      - name: data
        emptyDir: {}   # dashboard edits lost on restart — source of truth is ConfigMap

---
# -----------------------------------------------------------------------------
# Grafana Service — NodePort 30300
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: uvote-dev
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30300
    name: http
