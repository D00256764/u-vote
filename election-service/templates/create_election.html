{% extends "base.html" %}

{% block title %}Create Election - Election Admin{% endblock %}
{% block page_title %}Create Election{% endblock %}

{% block content %}
<div style="max-width: 680px;">
    <h4 class="fw-bold mb-4" style="color: #1a1a2e;">Create New Election</h4>

    <form method="POST" id="createElectionForm">

        <div class="mb-4">
            <label for="title" class="form-label fw-semibold" style="font-size:0.875rem;color:#374151;">
                Election Title <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="title" name="title"
                   placeholder="Enter election title"
                   style="border-radius:8px;border-color:#e5e7eb;font-size:0.875rem;" required>
        </div>

        <div class="mb-4">
            <label for="description" class="form-label fw-semibold" style="font-size:0.875rem;color:#374151;">
                Election Description <span class="text-danger">*</span>
            </label>
            <textarea class="form-control" id="description" name="description" rows="4"
                      placeholder="Enter a detailed description of this election"
                      style="border-radius:8px;border-color:#e5e7eb;font-size:0.875rem;resize:vertical;"></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold" style="font-size:0.875rem;color:#374151;">
                Voting Options <span class="text-danger">*</span>
            </label>
            <p class="text-muted mb-2" style="font-size:0.8rem;">Add at least 2 options for voters to choose from</p>
            <div id="optionsContainer">
                <input type="text" class="form-control mb-2" name="options[]" placeholder="Option 1"
                       style="border-radius:8px;border-color:#e5e7eb;font-size:0.875rem;" required>
                <input type="text" class="form-control mb-2" name="options[]" placeholder="Option 2"
                       style="border-radius:8px;border-color:#e5e7eb;font-size:0.875rem;" required>
            </div>
            <button type="button" id="addOptionBtn"
                    style="background:none;border:none;color:#2563eb;font-size:0.875rem;cursor:pointer;padding:0.25rem 0;display:flex;align-items:center;gap:0.3rem;">
                <i class="bi bi-plus-circle"></i> Add Another Option
            </button>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary" style="font-size:0.875rem;border-radius:8px;padding:0.55rem 1.25rem;">
                Save
            </button>
            <a href="/dashboard" class="btn btn-outline-secondary" style="font-size:0.875rem;border-radius:8px;padding:0.55rem 1.25rem;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    let optionCount = 2;
    document.getElementById('addOptionBtn').addEventListener('click', function () {
        optionCount++;
        const container = document.getElementById('optionsContainer');
        const wrapper = document.createElement('div');
        wrapper.className = 'd-flex gap-2 mb-2';
        wrapper.innerHTML = `
            <input type="text" class="form-control" name="options[]" placeholder="Option ${optionCount}"
                   style="border-radius:8px;border-color:#e5e7eb;font-size:0.875rem;">
            <button type="button" class="btn btn-outline-danger btn-sm" style="border-radius:8px;flex-shrink:0;"
                    onclick="this.parentElement.remove()">
                <i class="bi bi-trash"></i>
            </button>
        `;
        container.appendChild(wrapper);
    });
</script>
{% endblock %}
