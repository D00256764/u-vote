worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Allow CSV uploads (up to 2 MB)
    client_max_body_size 2m;

    upstream frontend  { server frontend-service:5000; }
    upstream admin     { server admin-service:5002; }
    upstream voting    { server voting-service:5003; }
    upstream results   { server results-service:5004; }
    upstream election  { server election-service:5005; }

    server {
        listen 80;
        server_name localhost;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass cookies / session headers through unchanged
        proxy_pass_header Set-Cookie;

        # ── Results service: /elections/{id}/results/* ────────────────────
        location ~* ^/elections/[0-9]+/results/ {
            proxy_pass http://results;
        }

        # ── Admin service: voter & token management ───────────────────────
        location ~* ^/elections/[0-9]+/(voters|tokens) {
            proxy_pass http://admin;
        }

        # ── Election service: dashboard and election CRUD ─────────────────
        location /dashboard {
            proxy_pass http://election;
        }

        location /elections {
            proxy_pass http://election;
        }

        # ── Voting service: voter ballot journey and receipt ───────────────
        location /vote {
            proxy_pass http://voting;
        }

        location /receipt {
            proxy_pass http://voting;
        }

        # ── Frontend service: home, login, register, logout ───────────────
        location / {
            proxy_pass http://frontend;
        }
    }
}
