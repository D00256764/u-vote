version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: voting-postgres
    environment:
      POSTGRES_DB: voting_db
      POSTGRES_USER: voting_user
      POSTGRES_PASSWORD: voting_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - voting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voting_user -d voting_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: voting-auth
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: voting_db
      DB_USER: voting_user
      DB_PASSWORD: voting_pass
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voting-network
    restart: unless-stopped

  voter-service:
    build:
      context: .
      dockerfile: voter-service/Dockerfile
    container_name: voting-voter
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: voting_db
      DB_USER: voting_user
      DB_PASSWORD: voting_pass
      SMTP_HOST: mailhog          # dev override — production uses real SMTP host via Secret
      SMTP_PORT: "1025"           # dev override — production uses 587
      SMTP_USE_TLS: "false"       # dev override — production uses true
      SMTP_FROM: "uvote@test.local"
      SMTP_USER: ""               # no auth required for local MailHog
      SMTP_PASS: ""               # no auth required for local MailHog
      FRONTEND_URL: http://frontend-service:5000
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - voting-network
    restart: unless-stopped

  voting-service:
    build:
      context: .
      dockerfile: voting-service/Dockerfile
    container_name: voting-voting
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: voting_db
      DB_USER: voting_user
      DB_PASSWORD: voting_pass
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voting-network
    restart: unless-stopped

  results-service:
    build:
      context: .
      dockerfile: results-service/Dockerfile
    container_name: voting-results
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: voting_db
      DB_USER: voting_user
      DB_PASSWORD: voting_pass
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voting-network
    restart: unless-stopped

  election-service:
    build:
      context: .
      dockerfile: election-service/Dockerfile
    container_name: voting-election
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: voting_db
      DB_USER: voting_user
      DB_PASSWORD: voting_pass
    ports:
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voting-network
    restart: unless-stopped

  frontend-service:
    build:
      context: .
      dockerfile: frontend-service/Dockerfile
    container_name: voting-frontend
    environment:
      AUTH_SERVICE_URL: http://auth-service:5001
      VOTER_SERVICE_URL: http://voter-service:5002
      VOTING_SERVICE_URL: http://voting-service:5003
      RESULTS_SERVICE_URL: http://results-service:5004
      ELECTION_SERVICE_URL: http://election-service:5005
      SESSION_SECRET: your-super-secret-session-key-change-this-in-production
    ports:
      - "8080:5000"
    depends_on:
      - auth-service
      - voter-service
      - voting-service
      - results-service
      - election-service
    networks:
      - voting-network
    restart: unless-stopped

  # MailHog — local development email testing ONLY.
  # Captures outgoing emails instead of delivering them to real recipients.
  # Not for production use. Web UI: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: uvote-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — receives emails from services
      - "8025:8025"   # HTTP Web UI
    networks:
      - voting-network

volumes:
  postgres_data:

networks:
  voting-network:
    driver: bridge
