<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Election Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #e8edf5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .auth-card { background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 360px; }
        .app-icon { width: 56px; height: 56px; background: #2563eb; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .form-control { border-radius: 8px; border-color: #e5e7eb; font-size: 0.875rem; padding: 0.6rem 0.85rem; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-label { font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.4rem; }
        .btn-signin { background: #2563eb; border: none; border-radius: 8px; padding: 0.65rem; font-weight: 600; font-size: 0.875rem; width: 100%; }
        .btn-signin:hover { background: #1d4ed8; }
        .btn-create { background: #f3f4f6; border: none; border-radius: 8px; padding: 0.65rem; font-weight: 500; font-size: 0.875rem; width: 100%; color: #374151; text-decoration: none; display: block; text-align: center; }
        .btn-create:hover { background: #e5e7eb; color: #1a1a2e; }
        .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1.25rem 0; }
        .divider-line { flex: 1; height: 1px; background: #e5e7eb; }
        .divider-text { font-size: 0.75rem; color: #9ca3af; white-space: nowrap; }
        .pw-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0; }
        .pw-toggle:hover { color: #374151; }
    </style>
</head>
<body>
    <div style="width:100%;max-width:360px;padding:1rem;">
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-{{ 'danger' if msg.category == 'error' else msg.category }} alert-dismissible fade show mb-3" role="alert" style="border-radius:10px;font-size:0.875rem;">
                    {{ msg.message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="text-center mb-4">
            <div class="app-icon">
                <i class="bi bi-card-checklist" style="color:white;font-size:1.5rem;"></i>
            </div>
            <h2 style="font-weight:700;color:#1a1a2e;font-size:1.5rem;margin-bottom:0.25rem;">Election Admin</h2>
            <p style="color:#6b7280;font-size:0.875rem;margin:0;">Sign in to manage your elections</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="position-relative">
                        <input type="password" name="password" class="form-control pe-5" id="passwordInput" placeholder="Enter your password" required>
                        <button type="button" class="pw-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember" style="border-radius:4px;">
                        <label class="form-check-label" for="remember" style="font-size:0.8rem;color:#6b7280;">Remember me</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-signin">Sign In</button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">Don't have an account?</span>
                <div class="divider-line"></div>
            </div>

            <a href="/register" class="btn-create">Create an Account</a>
        </div>

        <p class="text-center mt-4" style="font-size:0.75rem;color:#9ca3af;">
            <i class="bi bi-shield-lock"></i> Protected by enterprise-grade security
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
