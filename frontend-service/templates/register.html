<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Election Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #e8edf5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 2rem 1rem; }
        .auth-card { background: #fff; border-radius: 16px; padding: 2rem; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 440px; }
        .app-icon { width: 56px; height: 56px; background: #2563eb; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .form-control { border-radius: 8px; border-color: #e5e7eb; font-size: 0.875rem; padding: 0.6rem 0.85rem; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-label { font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.4rem; }
        .pw-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #9ca3af; cursor: pointer; padding: 0; }
        .pw-toggle:hover { color: #374151; }
        .req { font-size: 0.78rem; color: #9ca3af; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem; }
        .req.met { color: #16a34a; }
        .req i { font-size: 0.75rem; }
    </style>
</head>
<body>
    <div style="width:100%;max-width:440px;padding:1rem;">
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-{{ 'danger' if msg.category == 'error' else msg.category }} alert-dismissible fade show mb-3" role="alert" style="border-radius:10px;font-size:0.875rem;">
                    {{ msg.message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="text-center mb-4">
            <div class="app-icon">
                <i class="bi bi-card-checklist" style="color:white;font-size:1.5rem;"></i>
            </div>
            <h2 style="font-weight:700;color:#1a1a2e;font-size:1.5rem;margin-bottom:0.25rem;">Create Your Account</h2>
            <p style="color:#6b7280;font-size:0.875rem;margin:0;">Start managing elections in minutes</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="/register" id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Email Address <span class="text-danger">*</span></label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password <span class="text-danger">*</span></label>
                    <div class="position-relative">
                        <input type="password" name="password" class="form-control pe-5" id="passwordInput"
                               placeholder="Create a strong password" required minlength="8" oninput="checkStrength()">
                        <button type="button" class="pw-toggle" onclick="togglePw('passwordInput','eye1')">
                            <i class="bi bi-eye" id="eye1"></i>
                        </button>
                    </div>
                    <div class="mt-2" id="pwRequirements">
                        <div class="req" id="req-len"><i class="bi bi-x-circle"></i> At least 8 characters</div>
                        <div class="req" id="req-upper"><i class="bi bi-x-circle"></i> Contains uppercase letter</div>
                        <div class="req" id="req-lower"><i class="bi bi-x-circle"></i> Contains lowercase letter</div>
                        <div class="req" id="req-num"><i class="bi bi-x-circle"></i> Contains a number</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
                    <div class="position-relative">
                        <input type="password" name="confirm_password" class="form-control pe-5" id="confirmInput"
                               placeholder="Re-enter your password" required>
                        <button type="button" class="pw-toggle" onclick="togglePw('confirmInput','eye2')">
                            <i class="bi bi-eye" id="eye2"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" style="border-radius:8px;padding:0.65rem;font-weight:600;font-size:0.875rem;">
                    Create Account
                </button>
            </form>

            <p class="text-center mt-3 mb-0" style="font-size:0.8rem;color:#6b7280;">
                Already have an account? <a href="/login" style="color:#2563eb;text-decoration:none;font-weight:500;">Sign in</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePw(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
            else { input.type = 'password'; icon.className = 'bi bi-eye'; }
        }

        function checkStrength() {
            const pw = document.getElementById('passwordInput').value;
            setReq('req-len',   pw.length >= 8);
            setReq('req-upper', /[A-Z]/.test(pw));
            setReq('req-lower', /[a-z]/.test(pw));
            setReq('req-num',   /[0-9]/.test(pw));
        }

        function setReq(id, met) {
            const el = document.getElementById(id);
            el.className = 'req' + (met ? ' met' : '');
            el.querySelector('i').className = met ? 'bi bi-check-circle-fill' : 'bi bi-x-circle';
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pw = document.getElementById('passwordInput').value;
            const confirm = document.getElementById('confirmInput').value;

            if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[a-z]/.test(pw) || !/[0-9]/.test(pw)) {
                e.preventDefault();
                alert('Password does not meet the requirements.');
                return;
            }
            if (pw !== confirm) {
                e.preventDefault();
                document.getElementById('confirmInput').style.borderColor = '#dc2626';
                alert('Passwords do not match.');
            }
        });
    </script>
</body>
</html>
